version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ru_cms_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - ru_cms_network

  nginx:
    image: nginx:alpine
    container_name: ru_cms_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - ru_cms_network

  mysql:
    image: mysql:8.0
    container_name: ru_cms_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-ru_cms}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-ru_cms}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - ru_cms_network

  redis:
    image: redis:alpine
    container_name: ru_cms_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ru_cms_network

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ru_cms_queue
    restart: unless-stopped
    command: php artisan queue:work --tries=3 --timeout=90
    volumes:
      - ./:/var/www/html
    depends_on:
      - app
      - redis
    networks:
      - ru_cms_network

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ru_cms_scheduler
    restart: unless-stopped
    command: php artisan schedule:work
    volumes:
      - ./:/var/www/html
    depends_on:
      - app
      - mysql
      - redis
    networks:
      - ru_cms_network

volumes:
  mysql_data:
  redis_data:

networks:
  ru_cms_network:
    driver: bridge

